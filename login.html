<!DOCTYPE html>
<html lang="es-PY">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrar · Milena Machado</title>
<link rel="stylesheet" href="styles.css">
<style>
  body{display:flex;min-height:100vh;align-items:center;justify-content:center;padding:40px 20px}

  .back-btn{position:fixed;top:24px;left:24px;width:42px;height:42px;border-radius:50%;background:rgba(255,245,240,0.06);border:0.5px solid rgba(255,245,240,0.2);color:#FFF5F0;display:flex;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(12px);z-index:5;text-decoration:none;transition:all 0.25s}
  .back-btn:hover{background:rgba(255,245,240,0.1);transform:translateX(-2px)}

  .login-glow-1{position:fixed;width:520px;height:520px;left:-180px;top:-150px;border-radius:50%;background:radial-gradient(circle,rgba(232,184,196,0.4) 0%,rgba(232,184,196,0) 65%);pointer-events:none;z-index:0}
  .login-glow-2{position:fixed;width:380px;height:380px;right:-100px;bottom:-100px;border-radius:50%;background:radial-gradient(circle,rgba(184,41,74,0.5) 0%,rgba(184,41,74,0) 65%);pointer-events:none;z-index:0}
  .login-glow-3{position:fixed;width:240px;height:240px;left:50%;top:30%;border-radius:50%;background:radial-gradient(circle,rgba(212,163,86,0.32) 0%,rgba(212,163,86,0) 70%);pointer-events:none;z-index:0}

  .login-card{position:relative;width:100%;max-width:420px;z-index:1}

  .logo-stack{display:flex;flex-direction:column;align-items:center;margin-bottom:32px}
  .logo-row{display:flex;align-items:center;gap:14px;margin-bottom:14px}
  .logo-mark{width:48px;height:48px;border:0.5px solid rgba(255,245,240,0.55);border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:Georgia,serif;font-style:italic;font-size:24px;font-weight:500}
  .logo-words{font-size:15px;line-height:1.15;letter-spacing:0.16em;font-weight:500}
  .tagline{font-size:13px;color:rgba(232,184,196,0.85);text-align:center}

  /* Tabs login/registro */
  .tabs-row{display:flex;gap:6px;background:rgba(255,245,240,0.04);border:0.5px solid rgba(255,245,240,0.1);border-radius:12px;padding:4px;margin-bottom:24px}
  .tab-btn{flex:1;padding:11px;font-size:12px;font-weight:500;letter-spacing:0.16em;color:rgba(255,245,240,0.55);cursor:pointer;border-radius:9px;transition:all 0.25s;background:transparent;border:none;font-family:inherit}
  .tab-btn.active{background:linear-gradient(135deg,#FAC775,#D4A356);color:#3D1208}

  .tab-content{display:none}
  .tab-content.active{display:block}

  .login-title{font-size:30px;font-weight:500;text-align:center;margin:0 0 6px;letter-spacing:-0.02em}
  .login-subtitle{font-size:13px;color:rgba(255,245,240,0.6);text-align:center;margin:0 0 28px}

  .field-group{margin-bottom:18px}
  .field-label{font-size:10px;letter-spacing:0.2em;color:rgba(255,245,240,0.5);font-weight:500;display:block;margin-bottom:7px}
  .input-wrap{position:relative}
  .input-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);pointer-events:none}
  .input-padded{width:100%;padding:14px 16px 14px 44px;background:rgba(255,245,240,0.04);border:0.5px solid rgba(255,245,240,0.15);border-radius:11px;color:#FFF5F0;font-size:14px;outline:none;box-sizing:border-box;font-family:inherit;transition:border-color 0.2s}
  .input-padded:focus{border-color:rgba(212,163,86,0.5)}

  .forgot-row{text-align:right;margin-bottom:18px}
  .forgot-link{font-size:12px;color:rgba(232,184,196,0.7);cursor:pointer;text-decoration:none;background:none;border:none;font-family:inherit}
  .forgot-link:hover{color:#E8B8C4}

  .submit-btn{width:100%;padding:16px;font-size:13px;font-weight:500;border-radius:12px;letter-spacing:0.18em}
  .submit-btn:disabled{opacity:0.6;cursor:not-allowed}

  .divider{display:flex;align-items:center;gap:14px;margin:22px 0}
  .divider-line{flex:1;height:0.5px;background:rgba(255,245,240,0.12)}
  .divider-text{font-size:10px;letter-spacing:0.2em;color:rgba(255,245,240,0.4)}

  /* Mensajes */
  .alert{padding:12px 14px;border-radius:10px;font-size:13px;margin-bottom:18px;display:none;align-items:flex-start;gap:10px}
  .alert.show{display:flex}
  .alert.error{background:rgba(255,59,71,0.1);border:0.5px solid rgba(255,59,71,0.4);color:#FF8090}
  .alert.success{background:rgba(93,202,165,0.1);border:0.5px solid rgba(93,202,165,0.4);color:#9FE1CB}
  .alert.info{background:rgba(212,163,86,0.1);border:0.5px solid rgba(212,163,86,0.4);color:#FAC775}

  /* Loading */
  .loading-dots{display:inline-flex;gap:4px}
  .loading-dots span{width:6px;height:6px;border-radius:50%;background:currentColor;animation:loadingDot 1.4s ease-in-out infinite both}
  .loading-dots span:nth-child(2){animation-delay:0.16s}
  .loading-dots span:nth-child(3){animation-delay:0.32s}
  @keyframes loadingDot{0%,80%,100%{opacity:0.3;transform:scale(0.8)}40%{opacity:1;transform:scale(1)}}

  @media (max-width:480px){
    .login-title{font-size:24px}
    .logo-mark{width:42px;height:42px;font-size:21px}
  }
</style>
</head>
<body>

<a href="/index" class="back-btn">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
</a>

<div class="login-glow-1"></div>
<div class="login-glow-2"></div>
<div class="login-glow-3"></div>

<div class="login-card">
  <div class="logo-stack">
    <div class="logo-row">
      <div class="logo-mark">M</div>
      <div class="logo-words">MILENA<br>MACHADO</div>
    </div>
    <div class="tagline serif-it">Creando Mentes Millonarias</div>
  </div>

  <!-- Mensajes de error/éxito -->
  <div class="alert" id="alertBox">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="alertIcon"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01" stroke-linecap="round"/></svg>
    <span id="alertText"></span>
  </div>

  <!-- Tabs -->
  <div class="tabs-row">
    <button class="tab-btn active" id="tab-login" onclick="cambiarTab('login')">ENTRAR</button>
    <button class="tab-btn" id="tab-registro" onclick="cambiarTab('registro')">REGISTRARSE</button>
  </div>

  <!-- TAB: LOGIN -->
  <div class="tab-content active" id="content-login">
    <h2 class="login-title serif">Bienvenida <span class="gradtext" style="font-size:30px">de vuelta</span></h2>
    <p class="login-subtitle">Entrá a tu cuenta para seguir aprendiendo</p>

    <form onsubmit="hacerLogin(event)">
      <div class="field-group">
        <label class="field-label">EMAIL</label>
        <div class="input-wrap">
          <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,245,240,0.5)" stroke-width="1.7"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6" stroke-linecap="round"/></svg>
          <input type="email" class="input-padded" placeholder="vos@ejemplo.com" id="loginEmail" required autocomplete="email">
        </div>
      </div>

      <div class="field-group">
        <label class="field-label">CONTRASEÑA</label>
        <div class="input-wrap">
          <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,245,240,0.5)" stroke-width="1.7"><rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4" stroke-linecap="round"/></svg>
          <input type="password" class="input-padded" placeholder="••••••••" id="loginPassword" required autocomplete="current-password">
        </div>
      </div>

      <div class="forgot-row">
        <button type="button" class="forgot-link" onclick="recuperarContrasena()">¿Olvidaste tu contraseña?</button>
      </div>

      <button type="submit" class="cta-gold submit-btn" id="loginBtn">ENTRAR</button>
    </form>
  </div>

  <!-- TAB: REGISTRO -->
  <div class="tab-content" id="content-registro">
    <h2 class="login-title serif">Crear tu <span class="gradtext" style="font-size:30px">cuenta</span></h2>
    <p class="login-subtitle">Es gratis · Solo te toma 30 segundos</p>

    <form onsubmit="hacerRegistro(event)">
      <div class="field-group">
        <label class="field-label">NOMBRE</label>
        <div class="input-wrap">
          <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,245,240,0.5)" stroke-width="1.7"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <input type="text" class="input-padded" placeholder="María González" id="regNombre" required>
        </div>
      </div>

      <div class="field-group">
        <label class="field-label">EMAIL</label>
        <div class="input-wrap">
          <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,245,240,0.5)" stroke-width="1.7"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6" stroke-linecap="round"/></svg>
          <input type="email" class="input-padded" placeholder="vos@ejemplo.com" id="regEmail" required autocomplete="email">
        </div>
      </div>

      <div class="field-group">
        <label class="field-label">CONTRASEÑA · MÍNIMO 6 CARACTERES</label>
        <div class="input-wrap">
          <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,245,240,0.5)" stroke-width="1.7"><rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4" stroke-linecap="round"/></svg>
          <input type="password" class="input-padded" placeholder="••••••••" id="regPassword" required minlength="6" autocomplete="new-password">
        </div>
      </div>

      <button type="submit" class="cta-gold submit-btn" id="registroBtn">CREAR MI CUENTA</button>
    </form>

    <p style="text-align:center;font-size:11px;color:rgba(255,245,240,0.5);margin-top:18px;line-height:1.5">
      Al crear tu cuenta aceptás nuestros <a href="#" style="color:#E8B8C4">términos</a> y <a href="#" style="color:#E8B8C4">política de privacidad</a>.
    </p>
  </div>
</div>

<!-- Conectar con Supabase -->
<script src="supabase-config.js"></script>

<script>
  // Cuando Supabase esté listo, verificar si ya hay sesión
  window.onSupabaseReady = async () => {
    const user = await obtenerUsuario();
    if (user) {
      // Ya está logueado, redirigir
      window.location.href = '/';
    }
  };

  function cambiarTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    document.getElementById('content-' + tab).classList.add('active');
    ocultarAlerta();
  }

  function mostrarAlerta(mensaje, tipo) {
    const box = document.getElementById('alertBox');
    document.getElementById('alertText').textContent = mensaje;
    box.className = 'alert show ' + tipo;
  }

  function ocultarAlerta() {
    document.getElementById('alertBox').className = 'alert';
  }

  async function hacerLogin(e) {
    e.preventDefault();
    if (!sb) {
      mostrarAlerta('Conectando... esperá un segundo y volvé a intentar.', 'info');
      return;
    }
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;
    const btn = document.getElementById('loginBtn');

    btn.disabled = true;
    btn.innerHTML = '<span class="loading-dots"><span></span><span></span><span></span></span>';
    ocultarAlerta();

    const result = await iniciarSesion(email, password);

    if (result.exito) {
      mostrarAlerta('✓ Bienvenida! Redirigiendo...', 'success');
      setTimeout(() => { window.location.href = '/'; }, 800);
    } else {
      btn.disabled = false;
      btn.textContent = 'ENTRAR';
      let mensaje = result.error;
      if (mensaje.includes('Invalid login')) mensaje = 'Email o contraseña incorrectos';
      if (mensaje.includes('Email not confirmed')) mensaje = 'Tenés que confirmar tu email primero';
      mostrarAlerta(mensaje, 'error');
    }
  }

  async function hacerRegistro(e) {
    e.preventDefault();
    if (!sb) {
      mostrarAlerta('Conectando... esperá un segundo y volvé a intentar.', 'info');
      return;
    }
    const nombre = document.getElementById('regNombre').value;
    const email = document.getElementById('regEmail').value;
    const password = document.getElementById('regPassword').value;
    const btn = document.getElementById('registroBtn');

    btn.disabled = true;
    btn.innerHTML = '<span class="loading-dots"><span></span><span></span><span></span></span>';
    ocultarAlerta();

    const result = await registrarse(email, password, nombre);

    if (result.exito) {
      mostrarAlerta('✓ Cuenta creada! Redirigiendo...', 'success');
      setTimeout(() => { window.location.href = '/'; }, 1200);
    } else {
      btn.disabled = false;
      btn.textContent = 'CREAR MI CUENTA';
      let mensaje = result.error;
      if (mensaje.includes('already registered')) mensaje = 'Ese email ya tiene cuenta. Probá entrar.';
      if (mensaje.includes('Password')) mensaje = 'La contraseña tiene que tener al menos 6 caracteres';
      mostrarAlerta(mensaje, 'error');
    }
  }

  async function recuperarContrasena() {
    if (!sb) {
      mostrarAlerta('Conectando... esperá un segundo.', 'info');
      return;
    }
    const email = document.getElementById('loginEmail').value;
    if (!email) {
      mostrarAlerta('Escribí tu email arriba primero', 'info');
      return;
    }
    const result = await recuperarPassword(email);
    if (result.exito) {
      mostrarAlerta('✓ Te enviamos un email con instrucciones', 'success');
    } else {
      mostrarAlerta(result.error, 'error');
    }
  }
</script>

</body>
</html>
