<!DOCTYPE html>
<html lang="es-PY">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finalizar compra · Milena Machado</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased}
  html,body{background:#FAF6F2;color:#2D1818;min-height:100vh;font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif}
  a{color:inherit;text-decoration:none}
  input{font-family:inherit;color:inherit}
  .serif-it{font-family:Georgia,serif;font-style:italic;font-weight:500}
  .gradtext{background:linear-gradient(95deg,#B8294A,#D4A356,#B8294A);-webkit-background-clip:text;background-clip:text;color:transparent}

  .checkout-header{background:#FFF;border-bottom:0.5px solid rgba(45,24,24,0.1);padding:16px 32px;display:flex;align-items:center;gap:14px}
  .ck-logo-box{width:36px;height:36px;border:0.5px solid rgba(45,24,24,0.5);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:Georgia,serif;font-style:italic;font-size:18px;font-weight:500}
  .ck-logo-text{font-size:11px;line-height:1.15;letter-spacing:0.16em;font-weight:600}
  .ck-secure{margin-left:auto;display:flex;align-items:center;gap:7px;font-size:11.5px;color:rgba(45,24,24,0.55)}

  .checkout-layout{display:grid;grid-template-columns:1.2fr 0.85fr;gap:28px;padding:32px;max-width:1000px;margin:0 auto}
  .checkout-title{font-size:28px;font-weight:500;margin:0 0 6px;font-family:Georgia,serif;letter-spacing:-0.015em}
  .checkout-subtitle{font-size:13.5px;color:rgba(45,24,24,0.6);margin:0 0 24px}

  .form-card{background:#FFF;border:0.5px solid rgba(45,24,24,0.1);border-radius:14px;padding:24px;box-shadow:0 2px 12px rgba(45,24,24,0.04)}
  .field-group{margin-bottom:16px}
  .field-label{font-size:11px;letter-spacing:0.1em;color:rgba(45,24,24,0.6);font-weight:600;display:block;margin-bottom:6px;text-transform:uppercase}
  .field-input{width:100%;padding:13px 15px;background:#FAF6F2;border:1px solid rgba(45,24,24,0.15);border-radius:9px;font-size:14px;outline:none;transition:all 0.2s}
  .field-input:focus{border-color:#D4A356;background:#FFF;box-shadow:0 0 0 3px rgba(212,163,86,0.15)}
  .field-input::placeholder{color:rgba(45,24,24,0.35)}
  .field-help{font-size:11px;color:rgba(45,24,24,0.45);margin-top:4px}

  .pay-button{width:100%;padding:16px;background:linear-gradient(135deg,#FAC775,#E8B547,#D4A356);color:#3D1208;border:none;border-radius:12px;font-size:13.5px;font-weight:600;letter-spacing:0.12em;cursor:pointer;margin-top:8px;box-shadow:0 4px 14px rgba(212,163,86,0.35);transition:all 0.25s;display:flex;align-items:center;justify-content:center;gap:10px}
  .pay-button:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(212,163,86,0.5)}
  .pay-button:disabled{opacity:0.6;cursor:not-allowed;transform:none}

  /* Resumen */
  .summary-card{background:#FFF;border:0.5px solid rgba(45,24,24,0.1);border-radius:14px;padding:24px;height:fit-content;position:sticky;top:24px;box-shadow:0 2px 12px rgba(45,24,24,0.04)}
  .summary-title{font-size:13px;letter-spacing:0.1em;color:rgba(45,24,24,0.6);font-weight:600;text-transform:uppercase;margin-bottom:18px}
  .summary-course{display:flex;gap:14px;margin-bottom:18px;padding-bottom:18px;border-bottom:0.5px solid rgba(45,24,24,0.1)}
  .summary-poster{width:60px;height:80px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#FFF;font-family:Georgia,serif;font-style:italic;font-size:11px;text-align:center;padding:6px}
  .summary-course-info{flex:1}
  .summary-course-cat{font-size:9.5px;letter-spacing:0.14em;color:rgba(45,24,24,0.5);font-weight:600;margin-bottom:4px}
  .summary-course-title{font-size:15px;font-weight:600;line-height:1.2}
  .summary-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;font-size:13.5px}
  .summary-row.total{margin-top:14px;padding-top:14px;border-top:0.5px solid rgba(45,24,24,0.1);font-size:18px;font-weight:600}
  .summary-total-price{color:#7A1B2E;font-family:Georgia,serif}
  .summary-guarantee{margin-top:18px;padding:12px;background:rgba(93,202,165,0.1);border:0.5px solid rgba(93,202,165,0.3);border-radius:9px;font-size:11.5px;color:#1A6B4A;display:flex;gap:8px;align-items:flex-start}

  .alert{padding:12px 14px;border-radius:10px;font-size:13px;margin-bottom:16px;display:none;align-items:flex-start;gap:9px}
  .alert.show{display:flex}
  .alert.error{background:rgba(255,59,71,0.1);border:0.5px solid rgba(255,59,71,0.35);color:#C8203A}

  .loading-spinner{width:16px;height:16px;border:2px solid rgba(61,18,8,0.3);border-top-color:#3D1208;border-radius:50%;animation:spin 0.7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  @media (max-width:768px){
    .checkout-layout{grid-template-columns:1fr;padding:20px 16px}
    .checkout-title{font-size:24px}
    .summary-card{position:static;order:-1}
  }
</style>
</head>
<body>

<header class="checkout-header">
  <a href="/index" style="display:flex;align-items:center;gap:11px">
    <div class="ck-logo-box">M</div>
    <div class="ck-logo-text">MILENA<br>MACHADO</div>
  </a>
  <div class="ck-secure">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
    Pago seguro · Pagopar
  </div>
</header>

<div class="checkout-layout">
  <!-- Formulario -->
  <div>
    <h2 class="checkout-title">Finalizá tu <span class="serif-it gradtext" style="font-size:28px">compra</span></h2>
    <p class="checkout-subtitle">Completá tus datos y te llevamos a pagar de forma segura</p>

    <div class="alert error" id="alertBox">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01" stroke-linecap="round"/></svg>
      <span id="alertText"></span>
    </div>

    <div class="form-card">
      <div class="field-group">
        <label class="field-label">Nombre completo</label>
        <input class="field-input" id="ckNombre" placeholder="María González" autocomplete="name">
      </div>

      <div class="field-group">
        <label class="field-label">Email</label>
        <input class="field-input" id="ckEmail" type="email" placeholder="vos@ejemplo.com" autocomplete="email">
        <div class="field-help">Acá te enviaremos el acceso a tu curso</div>
      </div>

      <div class="field-group">
        <label class="field-label">Teléfono (WhatsApp)</label>
        <input class="field-input" id="ckTelefono" placeholder="0981 234 567" autocomplete="tel">
      </div>

      <div class="field-group">
        <label class="field-label">Número de cédula</label>
        <input class="field-input" id="ckDocumento" placeholder="1234567">
      </div>

      <button class="pay-button" id="payBtn" onclick="iniciarPago()">
        <span id="payBtnText">IR A PAGAR</span>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
      </button>
    </div>
  </div>

  <!-- Resumen -->
  <div class="summary-card">
    <div class="summary-title">Tu compra</div>
    <div class="summary-course">
      <div class="summary-poster" id="sumPoster" style="background:linear-gradient(160deg,#2D0A18,#4A0F1E,#1A0509)">
        <span id="sumPosterTitle">...</span>
      </div>
      <div class="summary-course-info">
        <div class="summary-course-cat" id="sumCat">CURSO</div>
        <div class="summary-course-title" id="sumTitle">Cargando...</div>
      </div>
    </div>
    <div class="summary-row">
      <span style="color:rgba(45,24,24,0.7)">Subtotal</span>
      <span id="sumSubtotal">—</span>
    </div>
    <div class="summary-row total">
      <span>Total</span>
      <span class="summary-total-price" id="sumTotal">—</span>
    </div>
    <div class="summary-guarantee">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="flex-shrink:0;margin-top:1px"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" stroke-linecap="round"/><polyline points="22 4 12 14.01 9 11.01" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Garantía de 7 días. Si no te gusta, te devolvemos tu dinero.
    </div>
  </div>
</div>

<script src="supabase-config.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const cursoSlug = params.get('curso') || 'cmm';
  let cursoActual = null;

  function mostrarError(msg) {
    const box = document.getElementById('alertBox');
    document.getElementById('alertText').textContent = msg;
    box.classList.add('show');
  }
  function ocultarError() {
    document.getElementById('alertBox').classList.remove('show');
  }

  // Cargar datos del curso
  const waitSupa = setInterval(async () => {
    if (typeof sb !== 'undefined' && sb !== null) {
      clearInterval(waitSupa);

      // Si está logueado, prellenar email
      const { data: { user } } = await sb.auth.getUser();
      if (user) {
        document.getElementById('ckEmail').value = user.email;
        const { data: perfil } = await sb.from('perfiles').select('nombre').eq('id', user.id).single();
        if (perfil?.nombre) document.getElementById('ckNombre').value = perfil.nombre;
      }

      // Cargar curso
      const { data: curso, error } = await sb.from('cursos').select('*').eq('slug', cursoSlug).single();
      if (error || !curso) {
        mostrarError('No se encontró el curso. Volvé al catálogo.');
        return;
      }
      cursoActual = curso;

      // Llenar resumen
      const precio = curso.precio_gs ? 'Gs ' + curso.precio_gs.toLocaleString('es-PY') : 'GRATIS';
      document.getElementById('sumCat').textContent = curso.categoria || 'CURSO';
      document.getElementById('sumTitle').textContent = curso.titulo;
      document.getElementById('sumPosterTitle').textContent = curso.titulo;
      document.getElementById('sumPoster').style.background = curso.color_gradient || 'linear-gradient(160deg,#2D0A18,#4A0F1E,#1A0509)';
      document.getElementById('sumSubtotal').textContent = precio;
      document.getElementById('sumTotal').textContent = precio;
    }
  }, 50);

  async function iniciarPago() {
    ocultarError();
    const nombre = document.getElementById('ckNombre').value.trim();
    const email = document.getElementById('ckEmail').value.trim();
    const telefono = document.getElementById('ckTelefono').value.trim();
    const documento = document.getElementById('ckDocumento').value.trim();

    if (!nombre) return mostrarError('Ingresá tu nombre completo');
    if (!email || !email.includes('@')) return mostrarError('Ingresá un email válido');
    if (!telefono) return mostrarError('Ingresá tu teléfono');
    if (!documento) return mostrarError('Ingresá tu número de cédula');
    if (!cursoActual) return mostrarError('Esperá que cargue el curso');

    const btn = document.getElementById('payBtn');
    const btnText = document.getElementById('payBtnText');
    btn.disabled = true;
    btnText.innerHTML = '<span class="loading-spinner"></span> Procesando...';

    try {
      // Llamar a la Edge Function rapid-endpoint
      const resp = await fetch('https://pdwooahpyustbqlrvlxz.supabase.co/functions/v1/rapid-endpoint', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
          'apikey': SUPABASE_ANON_KEY,
        },
        body: JSON.stringify({
          curso_slug: cursoSlug,
          email: email,
          nombre: nombre,
          telefono: telefono,
          documento: documento,
        }),
      });

      const data = await resp.json();

      if (data.exito && data.url_pago) {
        // Redirigir a Pagopar
        window.location.href = data.url_pago;
      } else {
        mostrarError(data.error || 'Hubo un problema al iniciar el pago. Intentá de nuevo.');
        btn.disabled = false;
        btnText.textContent = 'IR A PAGAR';
      }
    } catch (e) {
      mostrarError('Error de conexión: ' + e.message);
      btn.disabled = false;
      btnText.textContent = 'IR A PAGAR';
    }
  }
</script>

</body>
</html>
