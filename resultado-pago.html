<!DOCTYPE html>
<html lang="es-PY">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resultado del pago · Milena Machado</title>
<link rel="stylesheet" href="styles.css">
<style>
  body{display:flex;min-height:100vh;align-items:center;justify-content:center;padding:30px 20px}
  .result-glow-1{position:fixed;width:480px;height:480px;left:-160px;top:-140px;border-radius:50%;background:radial-gradient(circle,rgba(232,184,196,0.35),transparent 65%);pointer-events:none;z-index:0}
  .result-glow-2{position:fixed;width:360px;height:360px;right:-100px;bottom:-100px;border-radius:50%;background:radial-gradient(circle,rgba(212,163,86,0.3),transparent 65%);pointer-events:none;z-index:0}

  .result-card{position:relative;z-index:1;width:100%;max-width:460px;background:linear-gradient(180deg,rgba(45,10,24,0.6),rgba(26,5,9,0.6));border:0.5px solid rgba(255,245,240,0.1);border-radius:22px;padding:42px 32px;text-align:center;backdrop-filter:blur(16px)}

  .result-icon{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 22px;animation:popIn 0.5s cubic-bezier(0.34,1.6,0.64,1)}
  @keyframes popIn{0%{transform:scale(0);opacity:0}100%{transform:scale(1);opacity:1}}
  .result-icon.success{background:linear-gradient(135deg,rgba(93,202,165,0.25),rgba(93,202,165,0.08));border:0.5px solid rgba(93,202,165,0.5)}
  .result-icon.pending{background:linear-gradient(135deg,rgba(212,163,86,0.25),rgba(212,163,86,0.08));border:0.5px solid rgba(212,163,86,0.5)}
  .result-icon.error{background:linear-gradient(135deg,rgba(255,59,71,0.2),rgba(255,59,71,0.08));border:0.5px solid rgba(255,59,71,0.5)}

  .result-title{font-size:26px;font-weight:500;margin:0 0 10px;font-family:Georgia,serif;letter-spacing:-0.015em}
  .result-message{font-size:14px;color:rgba(255,245,240,0.7);line-height:1.5;margin:0 0 28px}

  .result-btn{display:inline-flex;align-items:center;justify-content:center;gap:9px;padding:15px 30px;border-radius:12px;font-size:13px;font-weight:500;letter-spacing:0.12em;cursor:pointer;width:100%;box-sizing:border-box}
  .result-btn-secondary{margin-top:12px;background:transparent;border:0.5px solid rgba(255,245,240,0.2);color:#FFF5F0}

  .result-spinner{width:50px;height:50px;border:3px solid rgba(212,163,86,0.2);border-top-color:#FAC775;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 22px}
  @keyframes spin{to{transform:rotate(360deg)}}

  .result-detail{background:rgba(255,245,240,0.04);border-radius:10px;padding:14px;margin-bottom:24px;font-size:12.5px;color:rgba(255,245,240,0.6);text-align:left}
  .result-detail-row{display:flex;justify-content:space-between;margin-bottom:6px}
  .result-detail-row:last-child{margin-bottom:0}
  .result-detail-row strong{color:#FFF5F0}
</style>
</head>
<body>

<div class="result-glow-1"></div>
<div class="result-glow-2"></div>

<div class="result-card">
  <!-- Estado: cargando -->
  <div id="loadingState">
    <div class="result-spinner"></div>
    <h1 class="result-title">Verificando tu pago...</h1>
    <p class="result-message">Esperá un momento mientras confirmamos con Pagopar.</p>
  </div>

  <!-- Estado: resultado (oculto al inicio) -->
  <div id="resultState" style="display:none">
    <div class="result-icon" id="resultIcon"></div>
    <h1 class="result-title" id="resultTitle"></h1>
    <p class="result-message" id="resultMessage"></p>
    <div id="resultButtons"></div>
  </div>
</div>

<script src="supabase-config.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const hashPedido = params.get('hash');

  function mostrarResultado(tipo, titulo, mensaje, botones) {
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('resultState').style.display = 'block';

    const icon = document.getElementById('resultIcon');
    icon.className = 'result-icon ' + tipo;

    if (tipo === 'success') {
      icon.innerHTML = '<svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="#5DCAA5" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
    } else if (tipo === 'pending') {
      icon.innerHTML = '<svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="#FAC775" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>';
    } else {
      icon.innerHTML = '<svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="#FF8090" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M15 9l-6 6M9 9l6 6"/></svg>';
    }

    document.getElementById('resultTitle').textContent = titulo;
    document.getElementById('resultMessage').textContent = mensaje;
    document.getElementById('resultButtons').innerHTML = botones;
  }

  const waitSupa = setInterval(async () => {
    if (typeof sb !== 'undefined' && sb !== null) {
      clearInterval(waitSupa);

      if (!hashPedido) {
        mostrarResultado('error', 'Pedido no encontrado', 'No pudimos identificar tu pedido. Si pagaste, revisá tu email.', '<a href="/index" class="cta-gold result-btn">VOLVER AL INICIO</a>');
        return;
      }

      // Buscar la compra en nuestra base
      const { data: compra } = await sb
        .from('compras')
        .select('*, cursos(titulo, slug)')
        .eq('pagopar_id', hashPedido)
        .maybeSingle();

      if (!compra) {
        mostrarResultado('pending', 'Procesando...', 'Tu pago está siendo procesado. Puede tardar unos minutos. Te avisaremos por email cuando se confirme.', '<a href="/index" class="cta-gold result-btn">VOLVER AL INICIO</a>');
        return;
      }

      if (compra.estado === 'pagado') {
        mostrarResultado(
          'success',
          '¡Pago confirmado! 🎉',
          'Tu compra se realizó con éxito. Revisá tu email para acceder a tu curso.',
          '<a href="/cursos" class="cta-gold result-btn">VER MIS CURSOS</a><a href="/index" class="result-btn result-btn-secondary">Ir al inicio</a>'
        );
      } else if (compra.estado === 'pendiente') {
        mostrarResultado(
          'pending',
          'Pago pendiente',
          'Tu pago todavía no se confirmó. Si elegiste pagar en boca de cobranza o transferencia, completá el pago. Te avisaremos por email.',
          '<a href="/index" class="cta-gold result-btn">VOLVER AL INICIO</a>'
        );
      } else {
        mostrarResultado(
          'error',
          'Pago no completado',
          'El pago fue cancelado o no se completó. Podés intentar de nuevo cuando quieras.',
          '<a href="/cursos" class="cta-gold result-btn">VOLVER AL CATÁLOGO</a>'
        );
      }
    }
  }, 50);
</script>

</body>
</html>
